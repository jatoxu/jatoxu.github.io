<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>聚合视频站 - Miao Video</title>
  <meta name="referrer" content="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <!-- 视频目录数据：里面声明 const videoList = [...]，见文件末尾说明 -->
  <script src="video.js" type="text/javascript" crossorigin="anonymous"></script>
  <!-- ArtPlayer 视频播放器 -->
  <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
  <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css"> -->
  <style>
    :root {
      --bg-dark: #02030a;
      --panel-glass: rgba(8, 10, 26, 0.26);
      --panel-glass-soft: rgba(10, 14, 35, 0.26);
      --accent: #f5c84c;
      --accent-strong: #ffdd55;
      --accent-pink: #ff7bb0;
      --accent-blue: #4ac8ff;
      --accent-green: #65f7c4;
      --accent-red: #ff5c7a;
      --text-main: #f5f6ff;
      --text-sub: #a1a6d0;
      --border-subtle: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 0, #1b2340 0, transparent 55%),
        radial-gradient(circle at 90% 100%, #211a38 0, transparent 60%),
        #02030a;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 104px);
      margin: 44px 80px;
      padding: 10px 12px;
      gap: 10px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: radial-gradient(circle at 0 0, rgba(255,255,255,0.06), transparent 60%),
                  radial-gradient(circle at 100% 100%, rgba(136,196,255,0.10), transparent 60%),
                  rgba(0,0,0,0.45);
      backdrop-filter: blur(14px);
      box-shadow:
        0 0 40px rgba(0,0,0,0.9),
        0 0 120px rgba(136,196,255,0.35);
    }
    @media (max-width: 1280px) {
      .app { margin: 32px 40px; height: calc(100vh - 70px); }
    }
    @media (max-width: 900px) {
      .app { margin: 16px; height: calc(100vh - 32px); }
    }

    .ripple-target, .btn, .video-item {
      position: relative;
      overflow: hidden;
    }
    .ripple-circle, .ripple-circle-inner {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%,-50%) scale(0);
      background: rgba(255,255,255,0.35);
      pointer-events: none;
      animation: ripple-pop .8s ease-out forwards;
    }
    .ripple-circle-inner { background: rgba(245,200,76,0.45); animation-duration: .8s; }
    @keyframes ripple-pop {
      0%   { transform: translate(-50%,-50%) scale(0);   opacity: .55; }
      100% { transform: translate(-50%,-50%) scale(1);   opacity: 0;   }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-radius: 18px;
      background: linear-gradient(120deg, rgba(255,255,255,0.06), rgba(7,10,30,0.90));
      border: 1px solid var(--border-subtle);
      box-shadow: 0 10px 26px rgba(0,0,0,0.8);
      min-height: 64px;
      flex-shrink: 0;
    }
    .logo-area { display: flex; align-items: center; gap: 10px; }
    .pikachu-box {
      width: 72px; height: 72px; border-radius: 50%; padding: 4px;
      background:
        radial-gradient(circle at 30% 0, rgba(255,255,255,0.65), rgba(255,230,140,1)),
        radial-gradient(circle at 70% 100%, rgba(255,150,200,0.9), rgba(255,220,130,0.9));
      box-shadow: 0 0 18px rgba(255,215,130,1), 0 14px 28px rgba(0,0,0,0.95);
      border: 2px solid rgba(255,238,190,1);
      display: flex; align-items: center; justify-content: center;
      animation: pika-float 2.4s ease-in-out infinite;
    }
    .pikachu-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    @keyframes pika-float { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-5px);} }
    .title-text h1 {
      margin: 0; font-size: 18px; letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(255,212,95,0.9), 0 0 26px rgba(255,176,117,0.7);
    }
    .header-controls { display: flex; align-items: center; gap: 14px; font-size: 11px; color: var(--text-sub); }
    .lang-toggle {
      display: inline-flex; border-radius: 999px; padding: 2px;
      border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    .lang-btn {
      border: none; background: transparent; padding: 3px 10px; border-radius: 999px;
      color: var(--text-sub); font-size: 11px; cursor: pointer;
    }
    .lang-btn.active {
      background: radial-gradient(circle at 30% 0, rgba(255,255,255,0.28), var(--accent));
      color: #231b08; font-weight: 600; box-shadow: 0 0 8px rgba(245,200,76,0.8);
    }
    .shortcut-hint { max-width: 260px; text-align: right; }
    .shortcut-toggle-btn {
      width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.35); color: var(--text-main); cursor: pointer; font-size: 14px;
      flex-shrink: 0;
    }

    /* ===== 主体两栏布局 8:2 ===== */
    .layout {
      display: grid;
      grid-template-columns: 8fr 2fr;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 10px;
      border-radius: 18px;
      background: var(--panel-glass-soft);
      border: 1px solid var(--border-subtle);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 34px rgba(0,0,0,0.85);
      z-index: 0;
    }

    /* ---- 左：视频播放面板 ---- */
    .video-panel { }
    .video-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      flex-shrink: 0;
    }
    #artplayer-app { width: 100%; height: 100%; }
    .video-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px;
      background: radial-gradient(circle at 50% 30%, rgba(120,150,255,0.18), transparent 65%), rgba(4,6,18,0.92);
      color: var(--text-sub);
      font-size: 13px;
      z-index: 2;
      pointer-events: none;
    }
    .video-placeholder.hidden { display: none; }
    .video-placeholder .ph-icon { font-size: 34px; opacity: .8; }

    .video-info-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
    }
    .video-text { min-width: 0; flex: 1 1 auto; }
    .video-title {
      margin: 0 0 4px;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-main);
      overflow-wrap: break-word;
    }
    .video-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--text-sub); }
    .chip {
      padding: 2px 9px; border-radius: 999px; font-size: 11px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
      color: var(--text-sub);
    }
    .fav-btn {
      flex-shrink: 0;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.35);
      color: var(--text-main);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .fav-btn.active {
      background: radial-gradient(circle at 30% 0, rgba(255,255,255,0.2), var(--accent-red));
      color: #fff5f7;
      box-shadow: 0 0 12px rgba(255,92,122,0.95);
      border-color: transparent;
    }

    /* ---- 右：视频列表面板 ---- */
    .playlist-panel { }
    .playlist-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .playlist-header h3 { margin: 0; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .playlist-tabs {
      display: inline-flex; border-radius: 999px; border: 1px solid rgba(255,255,255,0.2);
      padding: 2px; background: rgba(0,0,0,0.35); font-size: 11px;
    }
    .playlist-tab {
      padding: 4px 10px; border-radius: 999px; cursor: pointer; color: var(--text-sub);
    }
    .playlist-tab.active {
      background: radial-gradient(circle at 30% 0, rgba(255,255,255,0.18), rgba(110,190,255,0.95));
      color: #02030a; font-weight: 600; box-shadow: 0 0 8px rgba(110,190,255,0.5);
    }

    .playlist-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-sub);
    }
    .playlist-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .playmode-btn, .io-btn {
      border: none; border-radius: 999px; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; background: rgba(0,0,0,0.35); color: var(--text-sub);
      cursor: pointer; box-shadow: 0 0 8px rgba(0,0,0,0.8); flex-shrink: 0;
    }
    .playmode-btn.active {
      background: radial-gradient(circle at 30% 0, rgba(255,255,255,0.18), rgba(110,190,255,0.95));
      color: #02030a; box-shadow: 0 0 10px rgba(110,190,255,0.95);
    }
    .io-divider { width: 1px; align-self: stretch; background: rgba(255,255,255,0.15); margin: 0 2px; }

    .playlist-main {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      margin-top: 8px;
      padding-right: 2px;
    }
    .playlist-list { position: relative; z-index: 1; }

    .video-item {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      margin-bottom: 6px;
      border-radius: 10px;
      background: rgba(7,11,34,0.86);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: background .15s;
    }
    .video-item:hover { background: rgba(26,32,80,0.95); }
    .video-item.current {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(245,200,76,0.6);
    }
    .video-index { font-size: 11px; color: var(--text-sub); font-weight: 600; text-align: center; width: 18px; }
    .video-thumb {
      width: 56px; height: 34px; border-radius: 6px; overflow: hidden;
      background: rgba(255,255,255,0.06); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-sub);
    }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-item-meta { min-width: 0; }
    .video-item-title {
      font-size: 12px; color: var(--text-main);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .video-item-sub {
      font-size: 10px; color: var(--text-sub); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .video-fav-toggle {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.3); color: var(--text-sub); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .video-fav-toggle.active { color: var(--accent-red); }

    /* ---- 通用按钮 ---- */
    .btn {
      border: none; border-radius: 999px; padding: 6px 13px;
      background: radial-gradient(circle at 30% 0, rgba(255,255,255,0.2), var(--accent));
      color: #231b08; font-size: 12px; font-weight: 500; cursor: pointer;
      box-shadow: 0 7px 16px rgba(245,200,76,0.75);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn-secondary {
      background: radial-gradient(circle at 30% 0, rgba(255,255,255,0.05), rgba(80,100,180,0.95));
      color: var(--text-main); box-shadow: 0 6px 14px rgba(0,0,0,0.8);
    }
    .btn:active { transform: scale(0.96); }

    /* ---- toast / 更新提示条 ---- */
    #toast {
      position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
      padding: 8px 14px; border-radius: 999px; background: rgba(8,10,26,0.96);
      border: 1px solid rgba(255,255,255,0.15); font-size: 11px; color: var(--text-main);
      box-shadow: 0 12px 30px rgba(0,0,0,0.9); opacity: 0; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease; z-index: 1500;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

    .update-banner {
      position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      max-width: calc(100vw - 32px); padding: 10px 14px; border-radius: 16px;
      background: rgba(8,10,26,0.97); border: 1px solid rgba(245,200,76,0.5);
      box-shadow: 0 12px 30px rgba(0,0,0,0.9), 0 0 20px rgba(245,200,76,0.35);
      font-size: 12px; color: var(--text-main); z-index: 1600;
    }
    .update-banner .btn { flex-shrink: 0; }

    /* ---- 快捷键弹窗 ---- */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(2,3,10,0.7);
      display: none; align-items: center; justify-content: center; z-index: 2000;
    }
    .modal-backdrop.show { display: flex; }
    .modal-box {
      width: min(420px, 90vw); background: rgba(10,13,32,0.98);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; padding: 18px 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.9);
    }
    .modal-box h3 { margin: 0 0 12px; font-size: 15px; }
    .modal-box ul { margin: 0; padding-left: 18px; font-size: 12px; color: var(--text-sub); line-height: 1.9; }
    .modal-close-row { display: flex; justify-content: flex-end; margin-top: 14px; }

    /* ---- 滚动条美化 ---- */
    .playlist-main::-webkit-scrollbar { width: 6px; }
    .playlist-main::-webkit-scrollbar-track { background: transparent; }
    .playlist-main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 999px; }

    /* ===== 移动端适配 ===== */
    @media (max-width: 860px) {
      header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .header-controls { width: 100%; justify-content: space-between; }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      html, body {
        height: auto; min-height: 100%;
        overflow-y: auto; overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      .app { height: auto; min-height: 100vh; overflow: visible; }
      .panel { min-height: auto; }

      .playlist-main {
        max-height: 60vh;
        min-height: 220px;
        -webkit-overflow-scrolling: touch;
      }
    }
    @media (max-width: 480px) {
      .app { margin: 8px; padding: 8px 8px 14px; }
      .video-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="app">
    <header class="ripple-target">
      <div class="logo-area">
        <div class="pikachu-box ripple-target">
          <img src="mao.png" alt="logo" class="pikachu-img">
        </div>
        <div class="title-text">
          <h1 data-i18n="appTitle">聚合视频站</h1>
        </div>
      </div>
      <div class="header-controls">
        <div class="lang-toggle ripple-target">
          <button class="lang-btn active" data-lang="zh">中</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="shortcut-hint" data-i18n="shortcutHint">
          快捷键：Space 播放/暂停 · ←/→ 快进快退 · ↑/↓ 音量 · N/P 切换视频 · F 收藏
        </div>
        <button id="shortcut-toggle-btn" class="shortcut-toggle-btn ripple-target" title="快捷键说明">⌨️</button>
      </div>
    </header>

    <main class="layout">
      <!-- 左：视频播放区 -->
      <section class="panel video-panel ripple-target">
        <div class="video-stage">
          <div id="artplayer-app"></div>
          <div class="video-placeholder" id="video-placeholder">
            <div class="ph-icon">🎬</div>
            <div data-i18n="videoPlaceholderHint">从右侧列表选择一个视频吧！</div>
          </div>
        </div>
        <div class="video-info-row">
          <div class="video-text">
            <h2 class="video-title" id="video-title" data-i18n="videoPlaceholderTitle">暂未选择视频</h2>
            <div class="video-meta">
              <span id="video-actor"></span>
              <span class="chip" id="video-year" style="display:none;"></span>
            </div>
          </div>
          <button id="fav-btn" class="fav-btn ripple-target" title="收藏">🤍</button>
        </div>
      </section>

      <!-- 右：视频列表区 -->
      <section class="panel playlist-panel ripple-target">
        <div class="playlist-header">
          <h3><span>📜</span><span data-i18n="playlistTitle">视频列表</span></h3>
          <div class="playlist-tabs">
            <div class="playlist-tab active" data-tab="results" data-i18n="tabResults">推荐视频</div>
            <div class="playlist-tab" data-tab="favorites" data-i18n="tabFavorites">我的收藏</div>
          </div>
        </div>

        <div class="playlist-bar">
          <span id="playlist-info" data-i18n="playlistInfoResults">推荐视频列表</span>
          <div class="playlist-controls">
            <button class="playmode-btn ripple-target" data-mode="list" title="列表循环">🔁</button>
            <button class="playmode-btn ripple-target" data-mode="single" title="单曲循环">🔂</button>
            <button class="playmode-btn ripple-target" data-mode="shuffle" title="随机播放">🔀</button>
            <span class="io-divider"></span>
            <button id="export-fav-btn" class="io-btn ripple-target" title="导出收藏">💾</button>
            <button id="import-fav-btn" class="io-btn ripple-target" title="导入收藏">📂</button>
            <input type="file" id="import-fav-input" accept="application/json" hidden />
          </div>
        </div>

        <div class="playlist-main" id="playlist-main">
          <div class="playlist-list" id="playlist-list"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="shortcut-modal" class="modal-backdrop">
    <div class="modal-box">
      <h3 data-i18n="shortcutModalTitle">快捷键说明</h3>
      <ul>
        <li>Space：播放 / 暂停</li>
        <li>← / →：快退 / 快进 5 秒</li>
        <li>↑ / ↓：调高 / 调低音量</li>
        <li>N / P：下一个 / 上一个视频</li>
        <li>F：收藏 / 取消收藏当前视频</li>
        <li>Esc：关闭本说明</li>
      </ul>
      <div class="modal-close-row">
        <button id="shortcut-close" class="btn btn-secondary">关闭</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
  (function(){
    'use strict';

    // ===================== 语言包 =====================
    const LANGS = {
      zh: {
        appTitle:"聚合视频站",
        shortcutHint:"快捷键：Space 播放/暂停 · ←/→ 快进快退 · ↑/↓ 音量 · N/P 切换视频 · F 收藏",
        shortcutModalTitle:"快捷键说明",
        videoPlaceholderTitle:"暂未选择视频",
        videoPlaceholderHint:"从右侧列表选择一个视频吧！",
        playlistTitle:"视频列表",
        tabResults:"推荐视频",
        tabFavorites:"我的收藏",
        playlistInfoResults:"推荐视频列表",
        playlistInfoFavorites:"收藏列表",
        toastPlayError:"播放失败，请稍后重试",
        toastFavAdded:"已收藏",
        toastFavRemoved:"已取消收藏",
        toastFavExportEmpty:"收藏夹是空的，没有可导出的内容",
        toastFavExported:"已导出收藏",
        toastFavImported:"成功导入 {n} 个收藏",
        toastFavImportNoNew:"没有新增的收藏（可能都已存在）",
        toastFavImportError:"导入失败，请检查文件格式",
        toastPlaymodeList:"播放模式：列表循环",
        toastPlaymodeSingle:"播放模式：单曲循环",
        toastPlaymodeShuffle:"播放模式：随机播放",
        updateAvailable:"发现新版本 {v}，建议更新",
        updateNowLabel:"去更新",
        updateDismissLabel:"暂不提醒"
      },
      en: {
        appTitle:"miao Video Station",

    // ===================== 状态 =====================
    const state = {
      language:'zh',
      recommendedShuffled:[],
      recommendedRenderedCount:0,
      favorites:[],
      currentVideo:null,
      playContext:{type:'results', index:-1},
      playModeByTab:{results:'list', favorites:'list'}
    };

    const RECO_BATCH_SIZE = 100;
    const LIBRARY_STORAGE_KEY = 'pikachu-video-favorites-v1';
    const PLAYMODE_STORAGE_KEY = 'pikachu-video-playmode-tabs';

    // 每次打包新 APK / 发布新版本前，把这里的版本号改成新版本
    const APP_VERSION = '1.0.0';
    // 打包 APK 之前，把这里换成你自己存放 version.json 的稳定链接
    const UPDATE_CHECK_URL = 'YOUR_VERSION_JSON_URL_HERE';

    const dom = {};
    function $(id){ return document.getElementById(id); }

    function setupDOM(){
      dom.videoStage=$('artplayer-app');
      dom.videoPlaceholder=$('video-placeholder');
      dom.videoTitle=$('video-title');
      dom.videoActor=$('video-actor');
      dom.videoYear=$('video-year');
      dom.favBtn=$('fav-btn');

      dom.playlistInfo=$('playlist-info');

      dom.playlistList=$('playlist-list');

      dom.exportFavBtn=$('export-fav-btn');
      dom.importFavBtn=$('import-fav-btn');

    // ===================== 工具函数 =====================
    function showToast(msg){
      const toast=$('toast'); if(!toast)return;
      toast.textContent=msg;
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'),2000);
    }

    function shuffleArray(arr){
      for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        const tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
      }
      return arr;
    }

    function getVideoLibrary(){
      if(typeof videoList!=='undefined' && Array.isArray(videoList)) return videoList;
      if(window.videoList && Array.isArray(window.videoList)) return window.videoList;
      return [];
    }

    // ===================== 收藏存储 =====================
    function saveLibraryToStorage(){
      try{
        localStorage.setItem(LIBRARY_STORAGE_KEY, JSON.stringify({
          version:1,
          savedAt:new Date().toISOString(),
          favorites: state.favorites
        }));
      }catch(e){ console.warn('save favorites failed', e); }
    }

    function loadLibraryFromStorage(){
      try{
        const raw=localStorage.getItem(LIBRARY_STORAGE_KEY);
        if(!raw){ state.favorites=[]; return; }
        const data=JSON.parse(raw);
        state.favorites = Array.isArray(data.favorites) ? data.favorites.filter(v=>v && v.vid) : [];
      }catch(e){
        console.warn('load favorites failed', e);
        state.favorites=[];
      }
    }

    function isFavorited(vid){
      return state.favorites.some(v=>v.vid===vid);
    }

    function toggleFavorite(video){
      if(!video || !video.vid) return;
      const idx=state.favorites.findIndex(v=>v.vid===video.vid);
      if(idx>=0){
        state.favorites.splice(idx,1);
        showToast(t('toastFavRemoved'));
      }else{
        state.favorites.push({
          vid:video.vid, title:video.title||'', actor:video.actor||'',
          vYear:video.vYear||'', url:video.url||'', cover:video.cover||null
        });
        showToast(t('toastFavAdded'));
      }
      saveLibraryToStorage();
      if(state.currentVideo && state.currentVideo.vid===video.vid){
        updateFavBtnUI(video.vid);
      }
      renderPlaylistList();
    }

    // ===================== 播放模式（分 tab 记忆） =====================
    function savePlayModeTabs(){
      try{ localStorage.setItem(PLAYMODE_STORAGE_KEY, JSON.stringify(state.playModeByTab)); }
      catch(e){ console.warn('save playmode failed', e); }
    }
    function loadPlayModeTabs(){
      try{
        const raw=localStorage.getItem(PLAYMODE_STORAGE_KEY);
        if(!raw) return;
        const data=JSON.parse(raw);
        ['results','favorites'].forEach(k=>{
          if(data && (data[k]==='single'||data[k]==='shuffle'||data[k]==='list')){
            state.playModeByTab[k]=data[k];
          }
        });
      }catch(e){ console.warn('load playmode failed', e); }
    }
    function getDisplayedTab(){
      return document.querySelector('.playlist-tab.active')?.dataset.tab || 'results';
    }
    function getPlayModeFor(type){
      return state.playModeByTab[type] || 'list';
    }
    function setPlayModeFor(type, mode){
      state.playModeByTab[type]=mode;
      savePlayModeTabs();
    }
    function setPlaymodeUI(){
      const tab=getDisplayedTab();
      const mode=getPlayModeFor(tab);
      document.querySelectorAll('.playmode-btn').forEach(btn=>{
        btn.classList.toggle('active', btn.dataset.mode===mode);
      });
    }

    // ===================== 推荐视频（本地 video-list.js 曲库） =====================
    function ensureRecommendedInit(){
      if(state.recommendedShuffled && state.recommendedShuffled.length) return;
      state.recommendedShuffled = shuffleArray(getVideoLibrary().slice());
      state.recommendedRenderedCount = 0;
    }

    function playRandomRecommended(){
      ensureRecommendedInit();
      const lib = state.recommendedShuffled.length ? state.recommendedShuffled : getVideoLibrary();
      if(!lib.length) return;
      const video = lib[Math.floor(Math.random()*lib.length)];
      const idx = state.recommendedShuffled.indexOf(video);
      playVideo(video, {type:'results', index: idx});
    }

    function updatePlaylistInfoLabel(){
      const tab=getDisplayedTab();
      dom.playlistInfo.textContent = tab==='favorites' ? t('playlistInfoFavorites') : t('playlistInfoResults');
    }

    function buildVideoItem(video, indexLabel, context){
      const item=document.createElement('div');
      item.className='video-item ripple-target';
      if(state.currentVideo && state.currentVideo.vid===video.vid){
        item.classList.add('current');
      }

      const indexEl=document.createElement('div');
      indexEl.className='video-index';
      indexEl.textContent=indexLabel;

      const thumb=document.createElement('div');
      thumb.className='video-thumb';
      if(video.cover){
        const img=document.createElement('img');
        img.src=video.cover; img.alt='';
        thumb.appendChild(img);
      }else{
        thumb.textContent='🎬';
      }

      const meta=document.createElement('div');
      meta.className='video-item-meta';
      const titleEl=document.createElement('div');
      titleEl.className='video-item-title';
      titleEl.textContent=video.title||'';
      titleEl.title=video.title||'';
      const subEl=document.createElement('div');
      subEl.className='video-item-sub';
      const yearPart = video.vYear ? (video.vYear+'年 · ') : '';
      subEl.textContent = yearPart + (video.actor||'');
      meta.appendChild(titleEl); meta.appendChild(subEl);

      const favToggle=document.createElement('button');
      favToggle.className='video-fav-toggle';
      const favActive=isFavorited(video.vid);
      favToggle.classList.toggle('active', favActive);
      favToggle.textContent = favActive ? '❤' : '🤍';
      favToggle.title='收藏';
      favToggle.addEventListener('click', ev=>{
        ev.stopPropagation();
        toggleFavorite(video);
      });

      item.appendChild(indexEl);
      item.appendChild(thumb);
      item.appendChild(meta);
      item.appendChild(favToggle);

      item.addEventListener('click', ()=>{
        playVideo(video, context);
      });

      return item;
    }

    function renderRecommendedList(){
      ensureRecommendedInit();
      if(!state.recommendedRenderedCount){
        state.recommendedRenderedCount=Math.min(RECO_BATCH_SIZE, state.recommendedShuffled.length);
      }
      const wrap=dom.playlistList;
      wrap.innerHTML='';
      const list=state.recommendedShuffled.slice(0, state.recommendedRenderedCount);
      list.forEach((video,idx)=>{
        wrap.appendChild(buildVideoItem(video, idx+1, {type:'results', index: idx}));
      });
      updatePlaylistInfoLabel();
    }

    function loadMoreRecommended(){
      ensureRecommendedInit();
      if(state.recommendedRenderedCount >= state.recommendedShuffled.length) return;
      state.recommendedRenderedCount = Math.min(
        state.recommendedRenderedCount + RECO_BATCH_SIZE,
        state.recommendedShuffled.length
      );
      renderRecommendedList();
    }

    function renderFavoritesList(){
      const wrap=dom.playlistList;
      wrap.innerHTML='';
      state.favorites.forEach((video,idx)=>{
        wrap.appendChild(buildVideoItem(video, idx+1, {type:'favorites', index: idx}));
      });
      updatePlaylistInfoLabel();
    }

    function renderPlaylistList(){
      const tab=getDisplayedTab();
      if(tab==='favorites') renderFavoritesList();
      else renderRecommendedList();

    function getActiveList(){
      return state.playContext.type==='favorites' ? state.favorites : state.recommendedShuffled;

    // ===================== 播放核心 =====================

        pip:false,
        autoSize:false,
        autoMini:false,

        setting:false,

        flip: true, // 显示视频翻转功能

        playbackRateList: [0.5, 0.75, 1.0, 1.25, 1.5, 2.0],

        controls: [

            position: 'right',

                { html: '0.75', rate: 0.75 },

                { html: '1.25', rate: 1.25 },
                { html: '1.5', rate: 1.5 },
                { html: '2.0', rate: 2.0 },

            ],
            onSelect: function (item) {
                // alert('选择的倍速：' + item.rate);
                // console.log('选择的倍速：', item.html);

        lock: true, // 移动端显示一个 锁定按钮 ，用于隐藏底部 控制栏
        fastForward: true, // 移动端添加长按视频快进功能
        autoOrientation: true,  // 是否在移动端的网页全屏时，根据视频尺寸和视口尺寸，旋转播放器

        theme:'#f5c84c',

      art.on('video:ended', ()=>{ playNext('next'); });

    async function playVideo(video, context){
      if(!video || !video.url){ showToast(t('toastPlayError')); return; }
      dom.videoPlaceholder.classList.add('hidden');
      state.currentVideo=video;
      if(context) state.playContext=context;
      updateVideoInfoUI(video);

      const player=ensureArtplayer(video.url, video.cover||'');
      // const player=ensureArtplayer('video.mp4', video.cover||'poster.webp');
      if(!player) return;
      try{
        await player.switchUrl(video.url);
        player.poster=video.cover||'';
        player.play().catch(()=>{});
      }catch(e){
        console.error(e);
        showToast(t('toastPlayError'));
      }
      renderPlaylistList();
    }

    function updateVideoInfoUI(video){
      if(!video){
        dom.videoTitle.textContent=t('videoPlaceholderTitle');
        dom.videoActor.textContent='';
        dom.videoYear.style.display='none';
        dom.favBtn.classList.remove('active');
        dom.favBtn.textContent='🤍';
        return;
      }
      dom.videoTitle.textContent=video.title||'';
      dom.videoActor.textContent=video.actor||'';
      if(video.vYear){
        dom.videoYear.textContent=video.vYear+'年';
        dom.videoYear.style.display='inline-block';
      }else{
        dom.videoYear.style.display='none';
      }
      updateFavBtnUI(video.vid);
    }

    function updateFavBtnUI(vid){
      const active=isFavorited(vid);
      dom.favBtn.classList.toggle('active', active);
      dom.favBtn.textContent = active ? '❤' : '🤍';
    }

    function toggleFavoriteCurrent(){
      if(!state.currentVideo) return;
      toggleFavorite(state.currentVideo);
    }

    function playNext(direction){
      const list=getActiveList();
      if(!list.length) return;
      let idx=state.playContext.index ?? -1;
      if(idx<0 || idx>=list.length) idx=0;

      const mode=getPlayModeFor(state.playContext.type);

      if(mode==='single'){
        if(art){ art.currentTime=0; art.play().catch(()=>{}); }
        return;
      }
      if(mode==='shuffle'){
        if(list.length===1){
          idx=0;
        }else{
          let newIdx;
          do{ newIdx=Math.floor(Math.random()*list.length); }while(newIdx===idx);
          idx=newIdx;
        }
      }else{
        idx=(idx + (direction==='prev'?-1:1) + list.length) % list.length;
      }
      playVideo(list[idx], {type:state.playContext.type, index:idx});
    }

    // ===================== 收藏 导入 / 导出 =====================
    function exportFavoritesData(){
      if(!state.favorites.length){ showToast(t('toastFavExportEmpty')); return; }
      const payload={version:1, savedAt:new Date().toISOString(), favorites:state.favorites};
      const blob=new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const date=new Date().toISOString().slice(0,10);
      a.href=url; a.download='video-favorites-'+date+'.json';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      showToast(t('toastFavExported'));
    }

    function handleImportFavoritesFile(e){
      const file=e.target.files && e.target.files[0];
      e.target.value='';
      if(!file) return;
      const reader=new FileReader();
      reader.onload=()=>{
        try{
          const data=JSON.parse(reader.result);
          const incoming=Array.isArray(data.favorites) ? data.favorites : (Array.isArray(data) ? data : []);
          let added=0;
          incoming.forEach(v=>{
            if(!v || !v.vid) return;
            if(!state.favorites.some(f=>f.vid===v.vid)){
              state.favorites.push({
                vid:v.vid, title:v.title||'', actor:v.actor||'',
                vYear:v.vYear||'', url:v.url||'', cover:v.cover||null
              });
              added++;
            }
          });
          saveLibraryToStorage();
          renderPlaylistList();
          showToast(added>0 ? t('toastFavImported').replace('{n}', added) : t('toastFavImportNoNew'));
        }catch(err){
          console.error(err);
          showToast(t('toastFavImportError'));
        }
      };
      reader.readAsText(file);
    }

    // ===================== 检查更新 =====================
    function isNewerVersion(remote, current){
      const a=String(remote).split('.').map(n=>parseInt(n,10)||0);
      const b=String(current).split('.').map(n=>parseInt(n,10)||0);
      for(let i=0;i<Math.max(a.length,b.length);i++){
        const x=a[i]||0, y=b[i]||0;
        if(x>y) return true;
        if(x<y) return false;
      }
      return false;
    }
    function showUpdateBanner(data){
      if(document.getElementById('update-banner')) return;
      const bar=document.createElement('div');
      bar.id='update-banner'; bar.className='update-banner';
      const text=document.createElement('span');
      text.textContent=t('updateAvailable').replace('{v}', data.latestVersion||'');
      bar.appendChild(text);
      if(data.apkUrl){
        const btn=document.createElement('button');
        btn.className='btn btn-secondary';
        btn.textContent=t('updateNowLabel');
        btn.addEventListener('click',()=>{ window.open(data.apkUrl,'_blank'); });
        bar.appendChild(btn);
      }
      const closeBtn=document.createElement('button');
      closeBtn.className='btn btn-secondary';
      closeBtn.textContent='✕';
      closeBtn.title=t('updateDismissLabel');
      closeBtn.addEventListener('click',()=>bar.remove());
      bar.appendChild(closeBtn);
      document.body.appendChild(bar);
    }
    async function checkForUpdate(){
      if(!UPDATE_CHECK_URL || UPDATE_CHECK_URL.indexOf('YOUR_')===0) return;
      try{
        const res=await fetch(UPDATE_CHECK_URL, {cache:'no-store'});
        if(!res.ok) return;
        const data=await res.json();
        if(data && data.latestVersion && isNewerVersion(data.latestVersion, APP_VERSION)){
          showUpdateBanner(data);
        }
      }catch(e){
        console.warn('check update failed', e);
      }
    }

    // ===================== 背景粒子 / 涟漪效果 =====================
    let audioLevel=0;
    function setupParticles(){
      const canvas=$('bg-canvas'); const ctx=canvas.getContext('2d');
      function resize(){
        const dpr=window.devicePixelRatio||1;
        canvas.width=window.innerWidth*dpr;
        canvas.height=window.innerHeight*dpr;
        ctx.setTransform(dpr,0,0,dpr,0,0);
      }
      resize(); window.addEventListener('resize', resize);
      const parts=[];
      const N=90;
      for(let i=0;i<N;i++){
        parts.push({
          x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
          vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4,
          r:1+Math.random()*2.5, baseR:1+Math.random()*2.5,
          hue:200+Math.random()*120, a:0.22+Math.random()*0.3
        });
      }
      let mouse={x:window.innerWidth/2, y:window.innerHeight/2};
      window.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
      function tick(){
        ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
        const pulse=1+audioLevel*2.2;
        for(const p of parts){
          p.x+=p.vx; p.y+=p.vy; p.hue+=0.08;
          if(p.x<-40)p.x=window.innerWidth+40;
          if(p.x>window.innerWidth+40)p.x=-40;
          if(p.y<-40)p.y=window.innerHeight+40;
          if(p.y>window.innerHeight+40)p.y=-40;
          const dx=p.x-mouse.x, dy=p.y-mouse.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          const push=Math.max(0,140-dist)/140;
          p.x+=dx*0.011*push; p.y+=dy*0.011*push;
          ctx.beginPath();
          ctx.arc(p.x,p.y,p.baseR*pulse,0,Math.PI*2);
          const light=Math.min(80,60+audioLevel*40);
          ctx.fillStyle=`hsla(${p.hue},70%,${light}%,${p.a})`;
          ctx.fill();
        }
        ctx.lineWidth=0.45;
        for(let i=0;i<parts.length;i++){
          for(let j=i+1;j<parts.length;j++){
            const a=parts[i], b=parts[j];
            const dx=a.x-b.x, dy=a.y-b.y;
            const d=Math.sqrt(dx*dx+dy*dy);
            if(d<100){
              const al=0.10*(1-d/100)*(0.6+audioLevel*1.5);
              ctx.beginPath();
              ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
              ctx.strokeStyle=`rgba(120,160,255,${al})`;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(tick);
      }
      tick();
    }

    function setupRipple(){
      document.addEventListener('pointerdown', e=>{
        const target=e.target.closest('.ripple-target, .btn, .video-item');
        if(!target) return;
        const rect=target.getBoundingClientRect();
        const x=e.clientX-rect.left, y=e.clientY-rect.top;
        const max=Math.max(rect.width, rect.height);
        const outer=document.createElement('span');
        outer.className='ripple-circle';
        outer.style.left=x+'px'; outer.style.top=y+'px';
        outer.style.width=outer.style.height=(max*2)+'px';
        const inner=document.createElement('span');
        inner.className='ripple-circle-inner';
        inner.style.left=x+'px'; inner.style.top=y+'px';
        inner.style.width=inner.style.height=(max*1.4)+'px';
        target.appendChild(outer); target.appendChild(inner);
        setTimeout(()=>outer.remove(),800);
        setTimeout(()=>inner.remove(),800);
      });
    }

    // ===================== 事件绑定 =====================
    function setupEvents(){
      document.querySelectorAll('.lang-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>setLanguage(btn.dataset.lang));
      });

      document.querySelectorAll('.playlist-tab').forEach(tab=>{

          const tName=tab.dataset.tab;
          state.playContext.type=tName;
          state.playContext.index=-1;
          renderPlaylistList();
          setPlaymodeUI();
        });
      });

      document.querySelectorAll('.playmode-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const mode=btn.dataset.mode;
          const tab=getDisplayedTab();
          setPlayModeFor(tab, mode);
          setPlaymodeUI();
          if(mode==='list') showToast(t('toastPlaymodeList'));
          else if(mode==='single') showToast(t('toastPlaymodeSingle'));
          else showToast(t('toastPlaymodeShuffle'));

          if(tab==='results' && mode==='shuffle'){
            state.recommendedShuffled=[];
            state.recommendedRenderedCount=0;
            renderRecommendedList();
            playRandomRecommended();
          }
        });
      });

      dom.favBtn.addEventListener('click', toggleFavoriteCurrent);

      dom.exportFavBtn.addEventListener('click', exportFavoritesData);
      dom.importFavBtn.addEventListener('click', ()=>dom.importFavInput.click());
      dom.importFavInput.addEventListener('change', handleImportFavoritesFile);

      dom.shortcutToggleBtn.addEventListener('click', ()=>dom.shortcutModal.classList.add('show'));
      dom.shortcutCloseBtn.addEventListener('click', ()=>dom.shortcutModal.classList.remove('show'));
      dom.shortcutModal.addEventListener('click', e=>{
        if(e.target===dom.shortcutModal) dom.shortcutModal.classList.remove('show');
      });

      dom.playlistMain.addEventListener('scroll', ()=>{
        if(getDisplayedTab()!=='results') return;
        if(dom.playlistMain.scrollTop + dom.playlistMain.clientHeight >= dom.playlistMain.scrollHeight-10){
          loadMoreRecommended();
        }
      });

      document.addEventListener('keydown', e=>{
        const tagName=(document.activeElement && document.activeElement.tagName || '').toLowerCase();
        const typing = tagName==='input' || tagName==='textarea';
        const shortcutOpen = dom.shortcutModal.classList.contains('show');
        if(e.key==='Escape'){
          if(shortcutOpen) dom.shortcutModal.classList.remove('show');
          return;
        }
        if(shortcutOpen || typing) return;
        if(!art) return;
        if(e.code==='Space'){ e.preventDefault(); art.toggle(); }
        else if(e.key==='ArrowRight'){ art.currentTime=(art.currentTime||0)+5; }
        else if(e.key==='ArrowLeft'){ art.currentTime=Math.max(0,(art.currentTime||0)-5); }
        else if(e.key==='ArrowUp'){ e.preventDefault(); art.volume=Math.min(1,(art.volume||0)+0.05); }
        else if(e.key==='ArrowDown'){ e.preventDefault(); art.volume=Math.max(0,(art.volume||0)-0.05); }
        else if(e.key==='n'||e.key==='N'){ playNext('next'); }
        else if(e.key==='p'||e.key==='P'){ playNext('prev'); }
        else if(e.key==='f'||e.key==='F'){ toggleFavoriteCurrent(); }
      });
    }

    // ===================== 初始化 =====================
    function init(){
      setupDOM();
      try{ const lg=localStorage.getItem('pikachu-video-lang'); if(lg) state.language=lg; }catch(e){}
      loadLibraryFromStorage();
      loadPlayModeTabs();
      setupParticles();
      setupRipple();
      setupEvents();
      setLanguage(state.language);
      renderPlaylistList();
      setPlaymodeUI();
      // checkForUpdate();
      ensureArtplayer('video.mp4', 'poster.webp');
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
